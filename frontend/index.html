<!DOCTYPE html>
<html>
<head>

    <title>Library Dashboard</title>

    <link rel="stylesheet"
          href="css/style.css">

</head>

<body>

<div class="sidebar">

    <h2>Library App</h2>

    <ul>

        <li>Dashboard</li>
        <li>Members</li>
        <li>Books</li>
        <li>Issue Book</li>
        <li>Return Book</li>
        <li>Overdue Report</li>

    </ul>

</div>

<div class="main">

    <h1>Library Dashboard</h1>

    <div class="cards">

        <div class="card">
            <h3>Total Books</h3>
            <h1 id="totalBooks">0</h1>
        </div>

        <div class="card">
            <h3>Available Books</h3>
            <h1 id="availableBooks">0</h1>
        </div>

        <div class="card">
            <h3>Issued Books</h3>
            <h1 id="issuedBooks">0</h1>
        </div>

        <div class="card">
            <h3>Members</h3>
            <h1 id="members">0</h1>
        </div>

        <div class="card">
            <h3>Overdue Books</h3>
            <h1 id="overdueBooks">0</h1>
        </div>

    </div>

</div>

<script src="js/api.js"></script>
<script src="js/dashboard.js"></script>

</body>
</html>
